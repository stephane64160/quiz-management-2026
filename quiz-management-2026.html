<title>Quiz — Le management en France en 2026</title>
<style>
  :root {
    --paper: #e7e9ee;
    --card: #fbfbfc;
    --card-2: #f1f2f5;
    --ink: #171b23;
    --muted: #5c636f;
    --line: #d7dae1;
    --line-strong: #c3c7d0;
    --gold: #b57e1f;
    --gold-soft: #f4ead3;
    --green: #1c8f60;
    --green-soft: #e0f2e8;
    --red: #c5423e;
    --red-soft: #f6e3e2;
    --shadow: 0 1px 2px rgba(20,25,35,.05), 0 12px 34px -14px rgba(20,25,35,.22);
    --serif: Georgia, "Times New Roman", "Iowan Old Style", serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Segoe UI Mono", Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0c0f16;
      --card: #151a24;
      --card-2: #1c2230;
      --ink: #e8ebf1;
      --muted: #9aa2af;
      --line: #262d3a;
      --line-strong: #333c4c;
      --gold: #e2ad52;
      --gold-soft: #2a2313;
      --green: #37bd85;
      --green-soft: #12271d;
      --red: #e86a63;
      --red-soft: #2c1717;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 18px 40px -18px rgba(0,0,0,.7);
    }
  }
  :root[data-theme="light"] {
    --paper: #e7e9ee; --card: #fbfbfc; --card-2: #f1f2f5; --ink: #171b23;
    --muted: #5c636f; --line: #d7dae1; --line-strong: #c3c7d0; --gold: #b57e1f;
    --gold-soft: #f4ead3; --green: #1c8f60; --green-soft: #e0f2e8; --red: #c5423e;
    --red-soft: #f6e3e2; --shadow: 0 1px 2px rgba(20,25,35,.05), 0 12px 34px -14px rgba(20,25,35,.22);
  }
  :root[data-theme="dark"] {
    --paper: #0c0f16; --card: #151a24; --card-2: #1c2230; --ink: #e8ebf1;
    --muted: #9aa2af; --line: #262d3a; --line-strong: #333c4c; --gold: #e2ad52;
    --gold-soft: #2a2313; --green: #37bd85; --green-soft: #12271d; --red: #e86a63;
    --red-soft: #2c1717; --shadow: 0 1px 2px rgba(0,0,0,.3), 0 18px 40px -18px rgba(0,0,0,.7);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: clamp(16px, 4vw, 48px) 16px 64px;
  }
  .wrap { width: 100%; max-width: 660px; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 22px;
  }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand .kicker {
    font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--gold); font-weight: 600;
  }
  .brand h1 {
    font-family: var(--serif); font-weight: 600; font-size: clamp(19px, 2.4vw, 23px);
    margin: 0; letter-spacing: -.01em; line-height: 1.15; text-wrap: balance;
  }
  .theme-btn {
    flex: none; width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--line-strong); background: var(--card);
    color: var(--ink); cursor: pointer; font-size: 16px; line-height: 1;
    display: grid; place-items: center; transition: transform .15s, background .15s;
  }
  .theme-btn:hover { transform: rotate(-12deg); background: var(--card-2); }

  /* ---- progress ---- */
  .progress { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .segs { display: flex; gap: 6px; flex: 1; }
  .seg {
    height: 6px; flex: 1; border-radius: 99px; background: var(--line);
    transition: background .35s ease;
  }
  .seg.done { background: var(--gold); }
  .seg.current { background: color-mix(in srgb, var(--gold) 55%, var(--line)); }
  .progress .count {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }

  /* ---- card ---- */
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; box-shadow: var(--shadow);
    padding: clamp(20px, 4vw, 34px);
  }
  .eyebrow {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .chip {
    font-family: var(--mono); font-size: 11px; letter-spacing: .1em;
    text-transform: uppercase; padding: 5px 10px; border-radius: 99px;
    border: 1px solid var(--line-strong); color: var(--muted); font-weight: 600;
  }
  .chip.theme { color: var(--gold); border-color: color-mix(in srgb, var(--gold) 40%, var(--line-strong)); background: var(--gold-soft); }
  .chip.multi { color: var(--ink); border-style: dashed; }

  .qnum { font-family: var(--serif); color: var(--gold); font-size: 15px; }
  .question {
    font-family: var(--serif); font-size: clamp(21px, 3.2vw, 27px);
    line-height: 1.28; letter-spacing: -.01em; margin: 0 0 4px;
    text-wrap: balance;
  }
  .hint { color: var(--muted); font-size: 13.5px; margin: 4px 0 20px; }

  /* ---- options ---- */
  .options { display: flex; flex-direction: column; gap: 10px; list-style: none; margin: 0; padding: 0; }
  .opt {
    display: flex; align-items: flex-start; gap: 13px;
    padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--line-strong); background: var(--card);
    cursor: pointer; text-align: left; width: 100%; color: var(--ink);
    font-size: 15.5px; font-family: var(--sans); line-height: 1.4;
    transition: border-color .15s, background .15s, transform .08s;
  }
  .opt:hover:not(:disabled) { border-color: var(--gold); background: var(--card-2); }
  .opt:active:not(:disabled) { transform: scale(.992); }
  .opt:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .opt .mark {
    flex: none; width: 22px; height: 22px; margin-top: 1px;
    border: 1.5px solid var(--line-strong); display: grid; place-items: center;
    font-size: 13px; color: transparent; transition: all .15s;
    font-family: var(--sans);
  }
  .single .opt .mark { border-radius: 50%; }
  .multi-q .opt .mark { border-radius: 6px; }
  .opt.selected { border-color: var(--gold); background: var(--gold-soft); }
  .opt.selected .mark { border-color: var(--gold); background: var(--gold); color: #fff; }
  .opt .letter { font-family: var(--mono); font-weight: 700; color: var(--muted); margin-right: 2px; }
  .opt.selected .letter { color: var(--gold); }

  /* graded states */
  .opt.correct { border-color: var(--green); background: var(--green-soft); }
  .opt.correct .mark { border-color: var(--green); background: var(--green); color: #fff; }
  .opt.correct .letter { color: var(--green); }
  .opt.wrong { border-color: var(--red); background: var(--red-soft); }
  .opt.wrong .mark { border-color: var(--red); background: var(--red); color: #fff; }
  .opt.wrong .letter { color: var(--red); }
  .opt.missed { border-color: var(--green); border-style: dashed; background: transparent; }
  .opt.missed .mark { border-color: var(--green); color: var(--green); }
  .opt:disabled { cursor: default; }

  /* ---- actions ---- */
  .actions { margin-top: 22px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .btn {
    font-family: var(--sans); font-size: 15px; font-weight: 600;
    padding: 12px 24px; border-radius: 11px; cursor: pointer;
    border: 1px solid transparent; transition: transform .1s, box-shadow .15s, opacity .15s;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px -8px rgba(0,0,0,.4); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--gold); border-color: var(--line-strong); }
  .btn-ghost:hover { background: var(--card-2); border-color: var(--gold); }
  .select-note { font-size: 12.5px; color: var(--muted); font-family: var(--mono); }

  /* ---- feedback ---- */
  .feedback {
    margin-top: 22px; border-radius: 14px; padding: 18px 20px;
    border: 1px solid var(--line); background: var(--card-2);
    animation: rise .35s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .verdict { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 15px; margin-bottom: 10px; }
  .verdict.ok { color: var(--green); }
  .verdict.ko { color: var(--red); }
  .verdict .dot { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 13px; }
  .verdict.ok .dot { background: var(--green); }
  .verdict.ko .dot { background: var(--red); }
  .explain { font-size: 14.5px; color: var(--ink); margin: 0 0 14px; line-height: 1.55; }
  .statline {
    display: flex; align-items: baseline; gap: 12px; padding: 12px 14px;
    border-left: 3px solid var(--gold); background: var(--card);
    border-radius: 0 10px 10px 0; margin-bottom: 12px;
  }
  .statline .fig {
    font-family: var(--mono); font-weight: 700; font-size: clamp(22px, 4vw, 30px);
    color: var(--gold); font-variant-numeric: tabular-nums; line-height: 1; flex: none;
  }
  .statline .lab { font-size: 13.5px; color: var(--muted); line-height: 1.4; }
  .source { font-family: var(--mono); font-size: 11.5px; color: var(--muted); letter-spacing: .02em; }
  .source b { color: var(--ink); font-weight: 600; }

  /* ---- end screen ---- */
  .end { text-align: center; }
  .end .scorewrap { margin: 8px 0 6px; }
  .end .score {
    font-family: var(--serif); font-size: clamp(52px, 12vw, 76px); line-height: 1;
    letter-spacing: -.02em; color: var(--gold); font-variant-numeric: tabular-nums;
  }
  .end .score .slash { color: var(--muted); font-size: .5em; }
  .end .verdict-txt { font-family: var(--serif); font-size: 21px; margin: 6px 0 4px; }
  .end .sub { color: var(--muted); font-size: 14.5px; margin: 0 auto 26px; max-width: 44ch; }
  .recap { text-align: left; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .recap .ritem {
    display: flex; gap: 12px; padding: 13px 15px; border-radius: 11px;
    border: 1px solid var(--line); background: var(--card-2); align-items: flex-start;
  }
  .recap .ricon { flex: none; width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; color: #fff; margin-top: 2px; }
  .recap .ricon.ok { background: var(--green); }
  .recap .ricon.ko { background: var(--red); }
  .recap .rtext { font-size: 13.5px; }
  .recap .rtext .rt-q { font-weight: 600; display: block; margin-bottom: 2px; }
  .recap .rtext .rt-fig { font-family: var(--mono); color: var(--gold); font-weight: 600; }
  .recap .rtext .rt-src { display: block; margin-top: 3px; font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .footer-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 26px; font-family: var(--mono); }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>

<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <span class="kicker">Formation Managers · 2026</span>
      <h1>Le management en France&nbsp;: 5 chiffres à connaître</h1>
    </div>
    <button class="theme-btn" id="themeBtn" aria-label="Changer de thème" title="Thème clair / sombre">◐</button>
  </div>

  <div class="progress" id="progress">
    <div class="segs" id="segs"></div>
    <span class="count" id="count">01 / 05</span>
  </div>

  <div id="stage"></div>

  <p class="footer-note">Sources&nbsp;: Gallup · Lab des Futurs × Ipsos · Capstan/SFR Business · Syntec Numérique — millésime 2025-2026.</p>
</div>

<script>
const QUIZ = [
  {
    theme: "Engagement",
    multi: false,
    q: "Selon l'étude Gallup 2026, comment a évolué le taux d'engagement mondial des managers entre 2022 et 2025 ?",
    options: [
      "Il a progressé de 22 % à 31 %",
      "Il a chuté de 31 % à 22 %",
      "Il est resté stable, autour de 30 %",
      "Il a chuté de 22 % à 8 %"
    ],
    correct: [1],
    fig: "−9 pts",
    figLabel: "d'engagement chez les managers en 3 ans, dont −5 pts sur la seule année 2024-2025 — la plus forte baisse annuelle jamais mesurée.",
    explain: "L'engagement des managers passe de 31 % à 22 %. C'est l'effet « sandwich » : pris entre la pression du haut et le désengagement des équipes. En France, l'engagement des collaborateurs stagne autour de 8 %.",
    source: "<b>Gallup</b> — State of the Global Workplace 2026"
  },
  {
    theme: "Parité",
    multi: false,
    q: "En 2026, les femmes représentent 48 % des managers en France. Quelle est leur part dans les comités de direction (CODIR / COMEX) ?",
    options: [
      "48 % — la parité est atteinte",
      "40 %",
      "24 %",
      "15 %"
    ],
    correct: [2],
    fig: "24 %",
    figLabel: "de femmes dans les comités de direction, alors qu'elles sont 48 % à l'échelon manager. Le plafond de verre se situe au sommet.",
    explain: "La quasi-parité au niveau manager (48 %) ne se traduit pas en haut de la pyramide : seule une place sur quatre en comité de direction revient à une femme.",
    source: "<b>Étude 2026</b> relayée par Mediavenir"
  },
  {
    theme: "Charge mentale",
    multi: true,
    q: "À propos de la charge de travail des cadres managers français en 2026, quelles affirmations sont exactes ?",
    options: [
      "31 % déclarent travailler 50 heures par semaine ou plus",
      "51 % travaillent régulièrement sous pression",
      "3 managers sur 4 continuent à penser au travail en dehors du travail",
      "Une majorité déconnecte totalement le week-end"
    ],
    correct: [0, 1, 2],
    fig: "3 / 4",
    figLabel: "managers pensent encore au travail en dehors des heures. La déconnexion totale (option D) reste minoritaire.",
    explain: "Enquête menée auprès de 1 200 managers. La charge déborde largement le temps de travail : 31 % à 50h+/semaine, 51 % sous pression régulière, 3 sur 4 y pensent hors travail. L'affirmation D est fausse.",
    source: "<b>Lab des Futurs × Ipsos</b>, 2026"
  },
  {
    theme: "Organisation du travail",
    multi: false,
    q: "Quelle est la tendance dominante des entreprises françaises sur le télétravail en 2026 ?",
    options: [
      "94 % prévoient de maintenir le statu quo (ni réduction ni suppression)",
      "La majorité impose un retour à 100 % présentiel",
      "La plupart basculent en « full remote »",
      "50 % suppriment au moins un jour de télétravail"
    ],
    correct: [0],
    fig: "94 %",
    figLabel: "des entreprises maintiennent leur politique de télétravail en 2026. Le sujet se stabilise après le léger recul de 2025.",
    explain: "En 2025, seules 9 % des entreprises ont réduit le télétravail : 2026 confirme la stabilité. Utilisé par près d'un salarié sur deux (49 %), il affiche 92 % de satisfaction.",
    source: "<b>Capstan / SFR Business</b>, 2026"
  },
  {
    theme: "IA & compétences",
    multi: true,
    q: "À propos de l'IA et du management en France en 2026, quelles affirmations sont exactes ?",
    options: [
      "Plus de 73 % des grandes entreprises ont déployé ou expérimentent un assistant IA interne",
      "La France est en tête en Europe avec plus de 166 000 offres d'emploi liées à l'IA en 2026",
      "Le « prompt engineering » figure parmi les compétences IA les plus demandées aux managers",
      "Se former à l'IA impose désormais un niveau de data scientist"
    ],
    correct: [0, 1, 2],
    fig: "73 %+",
    figLabel: "des grandes entreprises françaises ont déployé ou testent un assistant IA interne. Piloter l'IA devient une compétence managériale de base.",
    explain: "L'IA se généralise (73 %+) et tire l'emploi (166 000+ offres). Le prompt engineering est clé, mais les formations pour managers sont conçues sans prérequis technique : il s'agit de piloter, pas de coder. L'affirmation D est fausse.",
    source: "<b>Baromètre Syntec Numérique / Dynexio</b>, 2026"
  }
];

const stage = document.getElementById('stage');
const segsEl = document.getElementById('segs');
const countEl = document.getElementById('count');
const progressEl = document.getElementById('progress');
const LETTERS = ['A', 'B', 'C', 'D'];

let idx = 0;
let selected = [];
let graded = false;
let results = []; // per-question boolean

// build progress segments
QUIZ.forEach(() => {
  const s = document.createElement('div');
  s.className = 'seg';
  segsEl.appendChild(s);
});

function pad(n){ return String(n).padStart(2, '0'); }

function updateProgress() {
  [...segsEl.children].forEach((s, i) => {
    s.className = 'seg' + (i < idx ? ' done' : i === idx ? ' current' : '');
  });
  countEl.textContent = pad(idx + 1) + ' / ' + pad(QUIZ.length);
}

function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const sb = [...b].sort();
  return [...a].sort().every((v, i) => v === sb[i]);
}

function renderQuestion() {
  progressEl.style.display = 'flex';
  updateProgress();
  const item = QUIZ[idx];
  selected = [];
  graded = false;

  const card = document.createElement('div');
  card.className = 'card ' + (item.multi ? 'multi-q' : 'single');
  card.innerHTML = `
    <div class="eyebrow">
      <span class="chip theme">${item.theme}</span>
      <span class="chip ${item.multi ? 'multi' : ''}">${item.multi ? 'Plusieurs réponses possibles' : 'Réponse unique'}</span>
    </div>
    <p class="question"><span class="qnum">Q${idx + 1}.</span> ${item.q}</p>
    <p class="hint">${item.multi ? 'Sélectionnez toutes les réponses correctes, puis validez.' : 'Sélectionnez une réponse, puis validez.'}</p>
    <ul class="options" id="options"></ul>
    <div class="actions" id="actions"></div>
    <div id="fbslot"></div>
  `;
  stage.innerHTML = '';
  stage.appendChild(card);

  const optsEl = card.querySelector('#options');
  item.options.forEach((text, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.type = 'button';
    btn.dataset.i = i;
    btn.innerHTML = `<span class="mark">${item.multi ? '✓' : '●'}</span>
      <span><span class="letter">${LETTERS[i]}.</span> ${text}</span>`;
    btn.addEventListener('click', () => onSelect(i));
    li.appendChild(btn);
    optsEl.appendChild(li);
  });

  const actions = card.querySelector('#actions');
  actions.innerHTML = `
    <button class="btn btn-primary" id="validate" disabled>Valider</button>
    <span class="select-note" id="selNote"></span>
  `;
  card.querySelector('#validate').addEventListener('click', grade);
}

function onSelect(i) {
  if (graded) return;
  const item = QUIZ[idx];
  if (item.multi) {
    const p = selected.indexOf(i);
    if (p === -1) selected.push(i); else selected.splice(p, 1);
  } else {
    selected = [i];
  }
  // reflect UI
  [...document.querySelectorAll('.opt')].forEach(b => {
    b.classList.toggle('selected', selected.includes(+b.dataset.i));
  });
  const validate = document.getElementById('validate');
  validate.disabled = selected.length === 0;
  const note = document.getElementById('selNote');
  if (item.multi && selected.length) note.textContent = selected.length + ' sélectionnée' + (selected.length > 1 ? 's' : '');
  else note.textContent = '';
}

function grade() {
  if (graded) return;
  graded = true;
  const item = QUIZ[idx];
  const correct = sameSet(selected, item.correct);
  results[idx] = correct;

  document.querySelectorAll('.opt').forEach(b => {
    const i = +b.dataset.i;
    b.disabled = true;
    const isCorrect = item.correct.includes(i);
    const isSel = selected.includes(i);
    b.classList.remove('selected');
    if (isCorrect && isSel) b.classList.add('correct');
    else if (!isCorrect && isSel) b.classList.add('wrong');
    else if (isCorrect && !isSel) b.classList.add('missed');
  });

  const actions = document.getElementById('actions');
  const last = idx === QUIZ.length - 1;
  actions.innerHTML = `<button class="btn btn-primary" id="next">${last ? 'Voir mon score' : 'Question suivante →'}</button>`;
  document.getElementById('next').addEventListener('click', () => {
    if (last) { renderEnd(); }
    else { idx++; renderQuestion(); }
  });

  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.innerHTML = `
    <div class="verdict ${correct ? 'ok' : 'ko'}">
      <span class="dot">${correct ? '✓' : '✕'}</span>
      ${correct ? 'Bonne réponse' : (item.multi ? 'Réponse incomplète ou inexacte' : 'Réponse incorrecte')}
    </div>
    <p class="explain">${item.explain}</p>
    <div class="statline">
      <span class="fig">${item.fig}</span>
      <span class="lab">${item.figLabel}</span>
    </div>
    <div class="source">Source&nbsp;: ${item.source}</div>
  `;
  document.getElementById('fbslot').appendChild(fb);
  fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderEnd() {
  const score = results.filter(Boolean).length;
  const total = QUIZ.length;
  progressEl.style.display = 'none';
  [...segsEl.children].forEach(s => s.className = 'seg done');

  let verdict, sub;
  if (score === total) { verdict = "Sans-faute — profil expert."; sub = "Vous maîtrisez les grandes tendances du management 2026. Prêt à animer le débat en formation."; }
  else if (score >= 3) { verdict = "Solide, quelques angles morts."; sub = "Une bonne lecture des enjeux. Revoyez les chiffres manqués pour affûter votre diagnostic."; }
  else { verdict = "Le terrain a bougé."; sub = "Le management 2026 réserve des surprises : reprenez le récap ci-dessous, ces chiffres nourrissent la discussion."; }

  const card = document.createElement('div');
  card.className = 'card end';
  card.innerHTML = `
    <div class="eyebrow" style="justify-content:center">
      <span class="chip theme">Résultat</span>
    </div>
    <div class="scorewrap"><span class="score">${score}<span class="slash">/${total}</span></span></div>
    <p class="verdict-txt">${verdict}</p>
    <p class="sub">${sub}</p>
    <div class="recap" id="recap"></div>
    <button class="btn btn-ghost" id="restart">↺ Recommencer le quiz</button>
  `;
  stage.innerHTML = '';
  stage.appendChild(card);

  const recap = card.querySelector('#recap');
  QUIZ.forEach((item, i) => {
    const ok = results[i];
    const row = document.createElement('div');
    row.className = 'ritem';
    row.innerHTML = `
      <span class="ricon ${ok ? 'ok' : 'ko'}">${ok ? '✓' : '✕'}</span>
      <span class="rtext">
        <span class="rt-q">Q${i + 1} · ${item.theme}</span>
        <span class="rt-fig">${item.fig}</span> — ${item.figLabel}
        <span class="rt-src">${item.source.replace(/<\/?b>/g, '')}</span>
      </span>
    `;
    recap.appendChild(row);
  });

  card.querySelector('#restart').addEventListener('click', () => {
    idx = 0; results = []; renderQuestion();
  });
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// theme toggle
const root = document.documentElement;
document.getElementById('themeBtn').addEventListener('click', () => {
  const current = root.getAttribute('data-theme')
    || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
});

renderQuestion();
</script>
